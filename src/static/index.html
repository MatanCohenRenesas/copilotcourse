<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mergington High School Activities</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <div class="header-top">
        <h1>🎓 Mergington High School</h1>
        <div class="header-controls">
          <select id="language-select" class="language-select">
            <option value="en">English</option>
            <option value="es">Español</option>
            <option value="zh">中文</option>
          </select>
          <button id="dark-mode-toggle" class="dark-mode-toggle" title="Toggle dark mode">🌙</button>
        </div>
      </div>
      <h2 data-i18n="title">Extracurricular Activities</h2>
    </header>

    <main>
      <section id="activities-container">
        <h3 data-i18n="available-activities">Available Activities</h3>
        <div id="activities-list">
          <p data-i18n="loading">Loading activities...</p>
        </div>
      </section>

      <section id="signup-container">
        <h3 data-i18n="signup-title">Sign Up for an Activity</h3>
        <form id="signup-form">
          <div class="form-group">
            <label for="email" data-i18n="email-label">Student Email:</label>
            <input type="email" id="email" required placeholder="your-email@mergington.edu" />
          </div>
          <div class="form-group">
            <label for="activity" data-i18n="activity-label">Select Activity:</label>
            <select id="activity" required>
              <option value="" data-i18n="select-activity">-- Select an activity --</option>
              <!-- Activity options will be loaded here -->
            </select>
          </div>
          <button type="submit" data-i18n="signup-btn">Sign Up</button>
        </form>
        <div id="message" class="hidden"></div>
      </section>
    </main>

    <footer>
      <p>&copy; 2024 Mergington High School • <span data-i18n="footer-text">Discover Your Passion</span></p>
    </footer>

    <script src="app.js"></script>
  </body>
</html>
